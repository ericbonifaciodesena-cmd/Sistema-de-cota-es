<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sena Seguros — Cotação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(26,58,92,0.10);
      padding: 36px 40px;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e8edf3;
    }

    .card-header img {
      height: 48px;
      object-fit: contain;
    }

    .card-header h1 {
      font-size: 1.15rem;
      color: #1a3a5c;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-header h1 span {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      color: #6b7280;
      margin-top: 2px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #1a1a2e;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #1a3a5c;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #122840;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <img src="logo.png" alt="Sena Seguros">
      <h1>Sena Seguros
        <span>Dados da Cotação</span>
      </h1>
    </div>

    <form id="cotacaoForm">
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Nome completo do segurado">
      </div>

      <div class="field">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
      </div>

      <div class="field">
        <label for="modelo">Modelo do Carro</label>
        <input type="text" id="modelo" name="modelo" placeholder="Ex: Toyota Corolla XEi">
      </div>

      <div class="row">
        <div class="field">
          <label for="placa">Placa</label>
          <input type="text" id="placa" name="placa" placeholder="ABC-1234">
        </div>
        <div class="field">
          <label for="ano">Ano</label>
          <input type="text" id="ano" name="ano" placeholder="2024">
        </div>
      </div>

      <button type="submit">Salvar</button>
    </form>
  </div>
</body>
</html>
